<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance — Transactions</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark px-3">
        <a class="navbar-brand" href="index.html"><i class="bi bi-wallet2 me-2"></i>Finance</a>
        <div>
            <a href="index.html" class="btn btn-sm btn-outline-light me-2">Dashboard</a>
            <a href="settings.html" class="btn btn-sm btn-outline-light">Settings</a>
        </div>
    </nav>

    <main class="container py-4" style="max-width:800px">

        <!-- Month Navigator -->
        <div class="d-flex justify-content-center mb-4">
            <div class="month-nav">
                <button class="btn btn-outline-secondary" id="prev-month">
                    <i class="bi bi-chevron-left"></i>
                </button>
                <h4 id="month-label">Loading…</h4>
                <button class="btn btn-outline-secondary" id="next-month">
                    <i class="bi bi-chevron-right"></i>
                </button>
            </div>
        </div>

        <!-- Month Summary -->
        <div class="card mb-4">
            <div class="card-body py-3">
                <div class="row text-center">
                    <div class="col-4">
                        <div class="text-muted small mb-1">Income</div>
                        <div id="month-income" class="fs-5 fw-bold text-success">€0,00</div>
                    </div>
                    <div class="col-4">
                        <div class="text-muted small mb-1">Expenses</div>
                        <div id="month-expenses" class="fs-5 fw-bold text-danger">€0,00</div>
                    </div>
                    <div class="col-4">
                        <div class="text-muted small mb-1">Net</div>
                        <div id="month-net" class="fs-5 fw-bold">€0,00</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Transaction Form -->
        <div class="card mb-4">
            <div class="card-header fw-semibold">
                <i class="bi bi-plus-circle me-2"></i>Add Transaction
            </div>
            <div class="card-body">
                <div id="no-accounts-warning" class="alert alert-warning py-2 d-none">
                    <i class="bi bi-exclamation-triangle me-1"></i>
                    No bank accounts found. <a href="settings.html" class="alert-link">Add one in Settings</a> first.
                </div>
                <form id="add-tx-form" novalidate>
                    <div class="row g-2">
                        <div class="col-6 col-md-3">
                            <label class="form-label small mb-1">Date</label>
                            <input type="date" id="tx-date" class="form-control form-control-sm" required>
                        </div>
                        <div class="col-6 col-md-2">
                            <label class="form-label small mb-1">Amount (€)</label>
                            <input type="number" id="tx-amount" class="form-control form-control-sm" step="0.01" min="0.01" placeholder="0.00" required>
                        </div>
                        <div class="col-6 col-md-3">
                            <label class="form-label small mb-1">Account</label>
                            <select id="tx-account" class="form-select form-select-sm" required></select>
                        </div>
                        <div class="col-6 col-md-2">
                            <label class="form-label small mb-1">Type</label>
                            <select id="tx-type" class="form-select form-select-sm">
                                <option value="expense">Expense</option>
                                <option value="income">Income</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label small mb-1">Description</label>
                            <input type="text" id="tx-description" class="form-control form-control-sm" placeholder="e.g. Grocery shopping" required>
                        </div>
                        <div class="col-8 col-md-4" id="category-field">
                            <label class="form-label small mb-1">Category</label>
                            <select id="tx-category" class="form-select form-select-sm"></select>
                        </div>
                        <div class="col-4 col-md-2 d-flex align-items-end">
                            <button type="submit" id="add-tx-btn" class="btn btn-primary btn-sm w-100">
                                <i class="bi bi-plus-lg me-1"></i>Add
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Transaction List -->
        <div class="card mb-4">
            <div class="card-header fw-semibold">
                <i class="bi bi-list-ul me-2"></i>Transactions
            </div>
            <div id="transaction-list">
                <p class="text-muted p-3 mb-0">No transactions for this month.</p>
            </div>
        </div>

        <!-- Export / Import -->
        <div class="d-flex flex-wrap gap-2">
            <button class="btn btn-outline-secondary btn-sm" id="export-month-btn">
                <i class="bi bi-download me-1"></i>Export this month
            </button>
            <button class="btn btn-outline-secondary btn-sm" id="export-all-btn">
                <i class="bi bi-download me-1"></i>Export all data
            </button>
            <button class="btn btn-outline-secondary btn-sm" id="import-btn">
                <i class="bi bi-upload me-1"></i>Import data
            </button>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/format.js"></script>
    <script src="js/transactions.js"></script>
</body>
</html>
