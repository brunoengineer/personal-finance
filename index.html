<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance — Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark px-3">
        <a class="navbar-brand" href="index.html"><i class="bi bi-wallet2 me-2"></i>Finance</a>
        <div>
            <a href="transactions.html" class="btn btn-sm btn-outline-light me-2">Transactions</a>
            <a href="settings.html" class="btn btn-sm btn-outline-light">Settings</a>
        </div>
    </nav>

    <main class="container py-4" style="max-width:900px">

        <!-- Patrimônio -->
        <div class="text-center mb-5">
            <p class="text-muted text-uppercase small fw-semibold mb-1 tracking-widest">Total Patrimônio</p>
            <div id="total-patrimonio" class="patrimonio-value text-success">€0,00</div>
        </div>

        <!-- Account Cards -->
        <div class="row mb-4" id="accounts-row"></div>

        <!-- This Month Summary -->
        <div class="card mb-4">
            <div class="card-header fw-semibold">
                <i class="bi bi-calendar3 me-2"></i>This Month —
                <span id="current-month-label" class="text-muted fw-normal"></span>
                <a id="view-month-link" href="transactions.html" class="btn btn-sm btn-outline-primary float-end">Open</a>
            </div>
            <div class="card-body py-3">
                <div class="row text-center">
                    <div class="col-4">
                        <div class="text-muted small mb-1">Income</div>
                        <div id="month-income" class="fs-5 fw-bold text-success">€0,00</div>
                    </div>
                    <div class="col-4">
                        <div class="text-muted small mb-1">Expenses</div>
                        <div id="month-expenses" class="fs-5 fw-bold text-danger">€0,00</div>
                    </div>
                    <div class="col-4">
                        <div class="text-muted small mb-1">Net</div>
                        <div id="month-net" class="fs-5 fw-bold">€0,00</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Expenses by Category -->
        <div class="card mb-4">
            <div class="card-header fw-semibold">
                <i class="bi bi-pie-chart me-2"></i>Expenses by Category
                <span class="text-muted small fw-normal ms-1">— this month</span>
            </div>
            <div class="card-body" id="category-breakdown">
                <p class="text-muted mb-0">No expenses this month.</p>
            </div>
        </div>

        <!-- Recent Transactions -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span class="fw-semibold"><i class="bi bi-clock-history me-2"></i>Recent Transactions</span>
                <a href="transactions.html" class="btn btn-sm btn-outline-primary">View all</a>
            </div>
            <div id="recent-transactions">
                <p class="text-muted p-3 mb-0">No transactions yet.</p>
            </div>
        </div>
    </main>

    <!-- Edit Balance Modal -->
    <div class="modal fade" id="editBalanceModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header py-2">
                    <h6 class="modal-title">Update Balance — <span id="edit-balance-name"></span></h6>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="balance-account-id">
                    <input type="number" id="balance-input" class="form-control" step="0.01" placeholder="0.00">
                </div>
                <div class="modal-footer py-2">
                    <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary btn-sm" id="save-balance-btn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/format.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
